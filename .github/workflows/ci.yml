name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: false

      - name: Install dependencies
        run: |
          poetry install --with dev,test --no-interaction

      - name: Run Ruff (lint)
        run: |
          poetry run ruff check src/ tests/

      - name: Run Ruff (format check)
        run: |
          poetry run ruff format --check src/ tests/

      - name: Run MyPy (type check)
        run: |
          poetry run mypy src/halal_koperasi_agent

      - name: Run Bandit (security)
        run: |
          poetry run bandit -r src/ -f json -o bandit-report.json || true

      - name: Run Tests
        run: |
          poetry run pytest tests/ -v --tb=short --cov=src/halal_koperasi_agent --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check docs exist
        run: |
          ls -la docs/
          test -f docs/ARCHITECTURE.md
          test -f docs/DATA_SCHEMA.md
          test -f docs/EVALUATION.md
          test -f docs/DEPLOYMENT.md

  docker:
    name: Build Docker Images
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' || github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release Artifacts
    needs: [lint-and-test, docker]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog excerpt
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ ver) found=1 }
            found { print }
          ' CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Update release with artifacts
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            docs/*.md
            docs/*.pdf
            docs/*.pptx