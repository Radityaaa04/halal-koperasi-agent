version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: halal-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: halal-agent-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: halal-agent-app
    ports:
      - "8501:8501"  # Streamlit
      - "8001:8000"  # API (if added)
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./tests:/app/tests
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
      - PYTHONPATH=/app/src
      - LOG_LEVEL=INFO
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    working_dir: /app
    command: ["sleep", "infinity"]  # Keep running for exec
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:

networks:
  default:
    name: halal-agent-network